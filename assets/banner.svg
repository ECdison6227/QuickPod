<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#f9fafb"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- title -->
  <text x="640" y="80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#111827">QuickPod</text>
  <text x="640" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#6b7280">macOS 菜单栏工具箱</text>

  <!-- menu bar -->
  <g transform="translate(90, 170)" filter="url(#shadow)">
    <rect width="1100" height="56" rx="10" fill="#ffffff" stroke="#374151" stroke-width="2"/>
    <circle cx="40" cy="28" r="10" fill="#3b82f6"/>
    <rect x="70" y="18" width="120" height="8" rx="4" fill="#d1d5db"/>
    <rect x="210" y="18" width="80" height="8" rx="4" fill="#d1d5db"/>
    <rect x="310" y="18" width="100" height="8" rx="4" fill="#d1d5db"/>
    <circle cx="1040" cy="28" r="12" fill="#10b981" stroke="#ffffff" stroke-width="2"/>
    <text x="1040" y="33" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Q</text>
  </g>

  <!-- arrows down -->
  <line x1="640" y1="226" x2="640" y2="270" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- feature nodes -->
  <g transform="translate(120, 300)" filter="url(#shadow)">
    <rect width="230" height="110" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="6" rx="4" fill="#3b82f6"/>
    <text x="115" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2937">防睡眠</text>
    <text x="115" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">15/30/60 min · 不限时</text>
  </g>

  <g transform="translate(390, 300)" filter="url(#shadow)">
    <rect width="230" height="110" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="6" rx="4" fill="#10b981"/>
    <text x="115" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2937">休息提醒</text>
    <text x="115" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">自定义间隔 · 延后 5/10 min</text>
  </g>

  <g transform="translate(660, 300)" filter="url(#shadow)">
    <rect width="230" height="110" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="6" rx="4" fill="#8b5cf6"/>
    <text x="115" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2937">快速切换器</text>
    <text x="115" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">全局快捷键 · 方向键选择</text>
  </g>

  <g transform="translate(930, 300)" filter="url(#shadow)">
    <rect width="230" height="110" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="6" rx="4" fill="#f59e0b"/>
    <text x="115" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2937">桌面文件创建</text>
    <text x="115" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">TXT/MD/DOCX/XLSX/PPTX</text>
  </g>

  <!-- arrows to bottom -->
  <line x1="235" y1="410" x2="235" y2="480" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="505" y1="410" x2="505" y2="480" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="775" y1="410" x2="775" y2="480" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1045" y1="410" x2="1045" y2="480" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- bottom use cases -->
  <g transform="translate(140, 480)" filter="url(#shadow)">
    <rect width="240" height="68" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="120" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#374151">跑长任务保持唤醒</text>
    <text x="120" y="50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">构建 · 下载 · 推理</text>
  </g>

  <g transform="translate(430, 480)" filter="url(#shadow)">
    <rect width="240" height="68" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="120" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#374151">AI Agent 番茄钟</text>
    <text x="120" y="50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">25/45 min 提醒</text>
  </g>

  <g transform="translate(720, 480)" filter="url(#shadow)">
    <rect width="240" height="68" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="120" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#374151">讲课 / 演讲循环计时</text>
    <text x="120" y="50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">延后继续 · 循环提醒</text>
  </g>

  <g transform="translate(1010, 480)" filter="url(#shadow)">
    <rect width="240" height="68" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="120" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#374151">桌面快速创建文件</text>
    <text x="120" y="50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">todo.md · log.json</text>
  </g>

  <!-- footer -->
  <text x="640" y="610" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#9ca3af">for macOS 13+ · Swift + SwiftUI + AppKit</text>
</svg>
